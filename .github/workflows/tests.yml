name: "Tests"

on:
    push:
        paths:
            - "packages/**"
            - "examples/**"
            - "package.json"
            - "turbo.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
jobs:
    checks:
        name: Tests
        runs-on: ubuntu-22.04

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 2
            - uses: pnpm/action-setup@v4
              with:
                  version: 10.23.0
            - uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: "pnpm"
            - run: pnpm install --no-frozen-lockfile
            - run: pnpm run test --affected
